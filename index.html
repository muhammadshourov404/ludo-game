<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Ludo | By V4MPIR3</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div id="game-container">
        <div id="network-ui" class="network-panel">
            <div class="network-buttons">
                <button id="host-btn" class="premium-btn network-btn">Host Online Game</button>
                <div class="join-section">
                    <input type="text" id="room-input" placeholder="Enter Room Code" maxlength="6">
                    <button id="join-btn" class="premium-btn network-btn">Join</button>
                </div>
            </div>
            <p id="room-display" class="room-info"></p>
        </div>

        <header class="game-header">
            <div class="player-info" id="player-1-info">P1 (Red)</div>
            <div class="mode-indicator" id="current-mode">Classic Ludo</div>
            <div class="player-info" id="player-2-info">AI / P2 (Green)</div>
        </header>

        <main class="board-wrapper">
            <div id="ludo-board"></div>
        </main>

        <div class="controls-section">
            <div id="dice-container" class="dice"></div>
            <button id="roll-btn" class="premium-btn">Roll Dice</button>
        </div>

        <footer class="game-footer">
            <p>&copy; 2026 Muhammad Shourov (V4MPIR3). All Rights Reserved.</p>
            <a href="https://github.com/muhammadshourov404/ludo-game" target="_blank" class="github-link">GitHub Repo</a>
        </footer>

        <div id="win-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="winner-text">Congratulations!</h2>
                <p>You played like a pro!</p>
                <button onclick="location.reload()" class="premium-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Ludo PWA Registered!"))
                .catch(err => console.log("PWA Error:", err));
        }
    </script>
    <script type="module" src="js/board.js"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
